<!DOCTYPE html>
<html
        lang="en"
        xmlns:th="http://www.thymeleaf.org"
        xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
>
<head>
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">
        Checkout Demo
    </title>
    <meta charset="UTF-8"/>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>

    <link
            rel="stylesheet"
            href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
            integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
            crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/application.css"/>

    <!--
      layout.html — base Thymeleaf layout included by every page (index, checkout, result).
      Workshop step: Step 6
      Why: loads the Adyen.Web v6 Drop-in once (script + stylesheet) so any page that
           uses this layout can call `new AdyenCheckout(...)` / `new Dropin(...)`.
      Docs: https://docs.adyen.com/online-payments/build-your-integration/advanced-flow/?platform=Web&integration=Drop-in
    -->

    <!--
      Adyen.Web Drop-in stylesheet (v6.36.0).
      Provides the default look-and-feel for card form, payment method list, etc.
      We pin a specific version on purpose (latest as of 2026-05) — auto-updating
      "latest" URLs are NOT recommended for production, and not great for a workshop
      either because UI/behaviour could shift between runs.
      Bumping later? Check: https://docs.adyen.com/online-payments/release-notes/
      Note: we use the *-test CDN host because this app talks to Adyen TEST.
            For LIVE, switch to checkoutshopper-live.cdn.adyen.com (and corresponding region).
    -->
    <link
        rel="stylesheet"
        href="https://checkoutshopper-test.cdn.adyen.com/checkoutshopper/sdk/6.36.0/adyen.css"
    />

    <!--
      Adyen.Web Drop-in JavaScript SDK (v6.36.0).
      After this loads, `window.AdyenWeb` is available globally and exposes the
      `AdyenCheckout` factory and the `Dropin` component class (see adyenWebImplementation.js).
      SECURITY: this script is served from Adyen's CDN, not bundled with our app, so we
                automatically get bug-fix updates within the 6.36.x patch line via the CDN.
                For stricter setups you can add `integrity="sha384-..."` (SRI hash).
                See: https://docs.adyen.com/online-payments/release-notes (per-version SRI hashes)
    -->
    <script
        src="https://checkoutshopper-test.cdn.adyen.com/checkoutshopper/sdk/6.36.0/adyen.js"
    ></script>

</head>
<body>
<header id="header">
    <a href="/">
        <img src="/images/mystore-logo.svg" alt=""/>
    </a>
</header>
<div class="container">
    <th:block layout:fragment="content"/>
</div>
</body>
</html>
